[registries.crates-io]
protocol = "sparse"

[build]
# Use sccache to share/cached compiled crate artifacts across rebuilds and workspaces.
# Install with: brew install sccache  (or see https://github.com/mozilla/sccache)
rustc-wrapper = "sccache"

[env]
# Reasonable default cache size; adjust or override in your shell if needed.
SCCACHE_CACHE_SIZE = "10G"


[profile.dev]
opt-level = 1
debug = true
incremental = true

# Fast development builds for large dependencies (e.g. tao/wry/webkit).
# Use with: cargo build --profile dev-fast
[profile.dev-fast]
inherits = "dev"
opt-level = 0
incremental = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
