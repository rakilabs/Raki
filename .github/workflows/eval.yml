name: eval

on:
  push:
  pull_request:
  workflow_dispatch: # manual trigger for the real-model job (see below)

jobs:
  deterministic:
    name: deterministic gate (required, no model)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
      # Exclude the `raki` Tauri app crate: it needs GTK/webkit system libs the runner
      # lacks, and the eval gate is GUI-independent. App-crate CI is a separate concern.
      - run: cargo clippy --workspace --exclude raki --all-targets -- -D warnings
      # Runs loader invariants, the fake-embedder harness, and the keyword per-query
      # snapshot gate — all model-independent, so this job always means something.
      - run: cargo test --workspace --exclude raki

  real-model:
    name: real-model eval (manual)
    # Manual-only (workflow_dispatch): stock runners don't have the bge model cached, so
    # this would download the model + onnxruntime on every push — slow and flaky for a
    # non-blocking job. Run it on demand (or from a runner with a warm model cache). The
    # deterministic gate above is the always-on, required protection (spec D9).
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # fastembed caches the model under the working dir on first download; cache it
      # across runs. Adjust the path if the cache location differs in CI logs.
      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: src-tauri/.fastembed_cache
          key: fastembed-bge-small-en-v1.5
      - run: cargo test -p raki-eval --test eval_gate -- --ignored
