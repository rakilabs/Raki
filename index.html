<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <title>Raki — Second Brain</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #f8fafc;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      .dark #splash {
        background: #020617;
      }
      #splash .logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #3b82f6, #7c3aed);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 20px;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash .title {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        color: #0f172a;
      }
      .dark #splash .title {
        color: #f8fafc;
      }
      #splash .subtitle {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.875rem;
        color: #64748b;
      }
      .dark #splash .subtitle {
        color: #94a3b8;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="splash">
      <div class="logo">R</div>
      <div class="title">Raki</div>
      <div class="subtitle">Loading your second brain…</div>
    </div>

    <div id="root"></div>
    <div id="error-root" style="display:none; background:#fee; color:#900; padding:20px; font-family:monospace; white-space:pre-wrap;"></div>

    <script>
      (function() {
        var theme = localStorage.getItem('raki.theme') || 'system';
        var resolved = theme === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : theme;
        document.documentElement.classList.add(resolved);
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>
    <script>
      window.addEventListener('error', function(e) {
        var splash = document.getElementById('splash');
        if (splash) splash.style.display = 'none';
        var el = document.getElementById('error-root');
        el.style.display = 'block';
        el.textContent += 'ERROR: ' + e.message + '\n  at ' + (e.filename || '') + ':' + (e.lineno || 0) + ':' + (e.colno || 0) + '\n\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var splash = document.getElementById('splash');
        if (splash) splash.style.display = 'none';
        var el = document.getElementById('error-root');
        el.style.display = 'block';
        el.textContent += 'UNHANDLED PROMISE: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '\n\n';
      });
    </script>
    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
